{% extends "base.html" %}

{% block content %}
    <section class="container wrapper text-center">
        <h1 class="main-heading">{{page_title}}</h1>
        <h2 class="subheading">{{subheading}}</h2>
    </section>
    <section class="container wrapper text-center">
        <form action="/types_practice" method="POST">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Unbalanced Reaction</th>
                        <th scope="col">Reaction Type(s)</th>
                    </tr>
                </thead>
                <tbody>
                    {% for question in questions %}
                        <tr>
                            <th scope="row">{{questions[question][0]}}</th>
                            <td>{{question}}</td>
                            <td>
                                {% for rxn in rxn_types %}
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="checkbox" id="inlineCheckbox{{index}}" value={{rxn}}>
                                        <label class="form-check-label" for="inlineCheckbox{{index}}">{{rxn.replace('_',' ').title()}}</label>
                                    </div>
                                {% endfor %}
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
            <button type="submit" class="btn btn-success">Check Answers</button>
            <a class="btn btn-info" href="/types_practice" role="button">New Reactions</a>
        </form>
    </section>
    <section class="ml-3">
        <a class="btn btn-primary" href="/" role="button">Main Menu</a>
    </section>
{% endblock %}
